# All-in-one: image includes Node + gen.sh + Kafka CLI downloaded from Apache at build (see Dockerfile KAFKA_VERSION).
#
# CI/CD–safe image: no customer config baked in. On first start, open http://localhost:<host-port>/setup.html
# (host port = APP_PUBLISH_HOST_PORT in .env, default 443 -> container 3443).
# Prod-style HTTPS (no Nginx): mount server.key + server.crt to /app/ssl, set USE_HTTPS=1 (and SSL_KEY_PATH/SSL_CERT_PATH if not default).
# Optional: reverse proxy instead → TRUST_PROXY=1 + X-Forwarded-Proto; optional HSTS via HSTS_MAX_AGE (HTTPS responses only).
# and save configuration + credentials into the mounted volume (persists across image upgrades).
# JSON samples (when deploy/config is an empty mount): docker compose exec app ls /app/config-examples
# Optional: SETUP_TOKEN in .env — same value must be sent as header X-Setup-Token from the setup page.
#
# Manual config (alternative to web setup):
#   mkdir -p deploy/config
#   cp webapp/config/master.config.example.json deploy/config/master.config.json
#   cp webapp/config/credentials.example.json deploy/config/credentials.json
#   Edit both. Do not commit credentials.json.
#
# Runtime (Kafka client props, kube, packs):
#   mkdir -p runtime/configs runtime/.kube runtime/user_output
#   cp kafka-client*.properties → runtime/configs/
#   Default: oc login writes runtime/.kube/config. Use config-both only if you merge multiple clusters into one file.
#   Paths must match master.config oc.kubeconfig / gen.kubeconfigPath.
#
# Compose volume summary:
#   ./deploy/config  -> /app/config              master.config, credentials, audit
#   ./runtime        -> /opt/kafka-usermgmt      runtimeRoot + runtime/.kube (configs, packs — not gen.sh; gen.sh is only in image /app/bundled-gen)
#   /usr/bin         -> /host/usr/bin:ro         host oc (Linux)
# To bind ~/.kube over runtime/.kube, add an extra volume (see container-run-config.sh KUBE_HOST default).
#
# Run:
#   docker compose up -d --build
# Production publish on host 443: create .env with APP_PUBLISH_HOST_PORT=443 (Docker/Podman must be allowed to bind 443).
#   CLI (same env baseline as Portal — host oc + KUBECONFIG under runtime):
#     ./scripts/gen-in-container.sh
#   Or manual: docker compose exec app bash -lc 'export PATH=/host/usr/bin:$PATH KUBECONFIG=/opt/kafka-usermgmt/.kube/config GEN_BASE_DIR=/opt/kafka-usermgmt; /app/bundled-gen/gen.sh'
#
# master.config.json: runtimeRoot / oc.kubeconfig should point kubeconfig under /opt/kafka-usermgmt/.kube/ when using default layout
# Mount host oc: only works on Linux (path below). On Windows, use WSL2 or add `oc` to the image.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${APP_VERSION:-1.0.76}
        GIT_COMMIT: ${GIT_COMMIT:-}
        # Match broker-friendly client version when needed: KAFKA_VERSION, KAFKA_SCALA, KAFKA_LINK_NAME
        KAFKA_VERSION: ${KAFKA_VERSION:-3.6.1}
        KAFKA_SCALA: ${KAFKA_SCALA:-2.13}
        KAFKA_LINK_NAME: ${KAFKA_LINK_NAME:-kafka_2.13-3.6.1}
    image: confluent-kafka-user-management:latest
    ports:
      - "${APP_PUBLISH_HOST_PORT:-443}:3443"
    environment:
      CONFIG_PATH: /app/config/master.config.json
      # Set to 0 in locked-down prod if you do not want /setup.html to overwrite master.config.json
      ALLOW_SETUP_RECONFIGURE: ${ALLOW_SETUP_RECONFIGURE:-1}
      AUTH_ENABLED: ${AUTH_ENABLED:-0}
      SETUP_TOKEN: ${SETUP_TOKEN:-}
      # Optional: GET /api/preflight/golive with header X-Golive-Token (same value) — runs scripts/verify-golive.sh inside container
      GOLIVE_REPORT_TOKEN: ${GOLIVE_REPORT_TOKEN:-}
      GOLIVE_PORTAL_BASE_URL: ${GOLIVE_PORTAL_BASE_URL:-}
      TRUST_PROXY: ${TRUST_PROXY:-0}
      USE_HTTPS: ${USE_HTTPS:-0}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-}
      SSL_CERT_PATH: ${SSL_CERT_PATH:-}
      HSTS_MAX_AGE: ${HSTS_MAX_AGE:-}
      HSTS_INCLUDE_SUBDOMAINS: ${HSTS_INCLUDE_SUBDOMAINS:-0}
    volumes:
      - ./runtime:/opt/kafka-usermgmt
      # Persistent config + credentials (survives docker image version bumps)
      - ./deploy/config:/app/config
      # HTTPS in-container (like Prod): mkdir deploy/ssl, place server.key + server.crt, set USE_HTTPS=1 in .env
      # - ./deploy/ssl:/app/ssl:ro
      - /usr/bin:/host/usr/bin:ro
